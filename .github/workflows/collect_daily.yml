name: Collect daily metrics and score

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = JST 9:00
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python collector/discover_games.py
      - run: python collector/collect_store_rank.py
      - run: python collector/collect_trends.py

      # Twitch/YouTubeはSecrets未設定の間は失敗するが、他の収集・スコアリングは
      # 止めたくないため continue-on-error で握りつぶす
      - run: python collector/collect_twitch.py
        continue-on-error: true
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      - run: python collector/collect_youtube.py
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - run: python collector/scoring.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collector/games_master.yml data/
          git diff --staged --quiet || git commit -m "chore: daily discovery, collection, and scoring"
          git pull --rebase
          git push
